worker_processes 1;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 16M;

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    upstream puma { server 127.0.0.1:3000; }

    server {
        listen __PORT__ default_server;

        location / {
            proxy_pass http://puma;
            proxy_http_version 1.1;
            # Closed sim: present every request as https://<LOCAL_DOMAIN> so
            # Mastodon's host-authorization and force_ssl both pass over plain
            # internal HTTP. __LOCAL_DOMAIN__ is substituted per-world by entrypoint.sh.
            proxy_set_header Host __LOCAL_DOMAIN__;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;
        }
    }
}
